<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Story+Script&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <header class="container">
        <h1 class="title text-center m-3 p-2 story-font title-color">
            Link up with the fam
        </h1>
        <p class="subtitle text-center p-2">
            Bruv ipsum dolor sit amet, proper vibes innit. Mandem pull up to the sesh, chattin&apos; bare waffle like it&apos;s
            calm. Tingz get a bit mad when Dave starts gassin&apos;, but everyone&apos;s chill, just grabbin&apos; a cheeky pint and
            crackin&apos; on.
        </p>
    </header>

    <main class="container">
        <div id="card-box" class="row g-3">
            <!-- card insertion point -->
        </div>
    </main>

    <footer class="container w-50 my-5">
        <h2 class="story-font title-color text-center mb-4">Just joined the gang? Pop your card in!</h2>
        <form id="card-input">
            <div class="mb-3">
                <label for="name-input" class="form-label quicksand-font">Pop your name in</label>
                <input type="text" class="form-control" id="name-input" required>
            </div>
            <div class="mb-3">
                <label for="role-input" class="form-label quicksand-font">Chuck your role in the family</label>
                <input type="text" class="form-control" id="role-input" required>
            </div>
            <div class="mb-3">
                <label for="email-input" class="form-label quicksand-font">Whack your work email in</label>
                <input type="email" class="form-control" id="email-input" required>
            </div>

            <button type="submit" class="btn btn-primary story-font">🪄 Do your magic, mate.</button>
        </form>

    </footer>

    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./assets/script.js"></script>

</body>

</html>
